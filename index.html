
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keep Going ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe8f0,#fff8fb);
    font-family:'Poppins',sans-serif;
}

.card{
    width:700px;
    max-width:90%;
    background:white;
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    animation:fade 1s ease;
}

.heart{
    font-size:55px;
    animation:beat 1.5s infinite;
}

h1{
    margin-top:15px;
    color:#ff5d8f;
    font-size:34px;
}

.quote{
    margin-top:25px;
    color:#555;
    font-size:20px;
    line-height:1.8;
}

.footer{
    margin-top:35px;
    color:#999;
    font-size:15px;
}

@keyframes beat{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="card">

<div class="heart">❤️</div>

<h1>Keep Going</h1>

<div class="quote">
Don't compare your <b>Chapter 1</b> to someone else's <b>Chapter 20</b>.<br><br>

Focus on <b>understanding</b>, not finishing.<br>

Master the <b>basics</b>, trust the <b>process</b>, and you'll be amazed at how far you'll go. 🌸
</div>

<div class="footer">
Every great cybersecurity professional started exactly where you are today.
</div>

</div>

</body>
</html>
```
